# Deploy GitHub Pages: build Astro rồi đăng dist/ lên Pages.
# Kích hoạt khi push lên main (kể cả commit do trang Admin tạo qua GitHub API).
# Yêu cầu 1 lần: Settings → Pages → Source = "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Tự chuyển Pages sang build bằng Actions + GẮN TÊN MIỀN RIÊNG
      # (đổi build_type từng làm GitHub gỡ binding domain → luôn set lại cname ở đây)
      - name: Ensure Pages source = GitHub Actions + custom domain
        run: |
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"build_type":"workflow","cname":"baotangsobaochivietnam.com"}' || true
      - name: Configure Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true
      - name: Build Astro (install + build + upload artifact)
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
