name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Quyền tối thiểu cần để deploy lên GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ cho phép 1 lượt deploy chạy tại một thời điểm
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Tự bật GitHub Pages (build type = GitHub Actions) nếu repo chưa bật.
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Đóng gói toàn bộ site tĩnh ở thư mục gốc làm artifact.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
