<!doctype html>
<html lang="vi" data-lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bảo tàng Báo chí Việt Nam · VR 360°</title>

<link rel="stylesheet" href="css/tailwind.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,500;1,600;1,700&display=swap&subset=vietnamese" rel="stylesheet" />

<!-- Pannellum 360° viewer (tải hoãn — chỉ cần khi mở tour, không chặn hiển thị trang) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css" media="print" onload="this.media='all'" />
<script defer src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<!-- Giao diện trang (Tailwind tĩnh + style riêng) -->
<link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-cream text-ink">

<!-- ============================= HEADER ============================= -->
<header class="site-header fixed top-0 inset-x-0 z-50">
  <div class="max-w-[1280px] mx-auto px-5 md:px-8 h-[72px] flex items-center justify-between gap-4">
    <!-- Logo -->
    <a href="#home" class="flex items-center gap-3 shrink-0">
      <img src="assets/figma/logo.png" alt="Bảo tàng Báo chí Việt Nam" width="46" height="46" class="w-11 h-11 object-contain shrink-0" />
      <div class="leading-tight">
        <div class="font-display font-semibold text-[15px] tracking-wide" style="color:#814E00" data-vi-text="Bảo tàng Báo chí" data-en-text="Press Museum">Bảo tàng Báo chí</div>
        <div class="text-[9px] tracking-[.28em] uppercase text-orange" data-vi-text="Việt Nam" data-en-text="of Vietnam">Việt Nam</div>
      </div>
    </a>

    <!-- Nav -->
    <nav class="hidden md:flex items-center gap-7 text-[15px]">
      <a href="#home" class="navlink" data-nav data-vi-text="Trang chủ" data-en-text="Home">Trang chủ</a>
      <span class="gold-rule-v h-4"></span>
      <a href="#lich-su" class="navlink" data-nav data-vi-text="Lịch sử" data-en-text="History">Lịch sử</a>
      <span class="gold-rule-v h-4"></span>
      <a href="#ban-do" class="navlink" data-nav data-vi-text="Bản đồ" data-en-text="Map">Bản đồ</a>
      <span class="gold-rule-v h-4"></span>
      <a href="#footer" class="navlink" data-nav data-vi-text="Liên hệ" data-en-text="Contact">Liên hệ</a>
    </nav>

    <!-- Right -->
    <div class="flex items-center gap-3">
      <div class="lang-toggle" role="tablist" aria-label="Language">
        <button type="button" data-set-lang="vi" class="active">VI</button>
        <button type="button" data-set-lang="en">EN</button>
      </div>
      <a href="#ban-do" class="btn-vr hidden sm:inline-flex items-center gap-2 px-5 py-2.5 text-sm">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-14 9V3Z"/></svg>
        <span data-vi-text="Trải nghiệm VR 360°" data-en-text="Experience VR 360°">Trải nghiệm VR 360°</span>
      </a>
    </div>
  </div>
</header>

<!-- ============================= HERO ============================= -->
<section id="home" class="relative pt-[72px] min-h-screen flex items-center overflow-hidden">
  <div class="max-w-[1560px] mx-auto w-full px-5 md:px-10 grid lg:grid-cols-[1.22fr_.85fr] gap-6 lg:gap-10 items-center py-6">

    <!-- Left: 101 thật (sau) + ngòi bút thật + headline -->
    <div class="relative">
      <!-- 101 (SVG gốc Figma) -->
      <img src="assets/figma/101.svg" alt="" aria-hidden="true"
           class="absolute z-0 top-1/2 left-1/2 lg:left-[46%] -translate-x-1/2 -translate-y-1/2 pointer-events-none select-none
                  w-[118%] sm:w-[112%] lg:w-[116%] max-w-none" />

      <!-- ngòi bút thật (trái) + headline (phải) -->
      <div class="relative z-10 grid grid-cols-1 sm:grid-cols-[auto_1fr] items-center gap-2 sm:gap-7 lg:gap-9">
        <img src="assets/figma/nib.png" alt="" aria-hidden="true"
             class="justify-self-center sm:justify-self-start w-[140px] sm:w-[210px] lg:w-[clamp(220px,16.5vw,320px)] drop-shadow-[0_26px_44px_rgba(188,131,31,.28)]" />

        <div class="text-center sm:text-left">
          <h1 class="leading-[.96] italic">
            <span class="block text-[40px] sm:text-[54px] lg:text-[clamp(46px,4.4vw,64px)] text-goldgrad font-medium uppercase tracking-wide" data-vi-text="Bút Sắc" data-en-text="Sharp Pen">Bút Sắc</span>
            <span class="block text-[44px] sm:text-[60px] lg:text-[clamp(52px,5vw,72px)] font-bold uppercase tracking-tight" style="color:#814E00" data-vi-text="Lòng Son" data-en-text="Pure Heart">Lòng Son</span>
            <span class="block text-[44px] sm:text-[60px] lg:text-[clamp(52px,5vw,72px)] font-bold uppercase tracking-tight" style="color:#814E00" data-vi-text="Tâm Sáng" data-en-text="Bright Soul">Tâm Sáng</span>
          </h1>
          <p class="italic text-lg sm:text-xl mt-5 max-w-[40ch] mx-auto sm:mx-0" style="color:#814E00"
             data-vi-text="Tự hào trăm năm Báo chí Cách mạng Việt Nam giữ lửa ngòi bút."
             data-en-text="A proud century of Vietnam's revolutionary press, keeping the pen's flame alive.">
            Tự hào trăm năm Báo chí Cách mạng Việt Nam giữ lửa ngòi bút.
          </p>
        </div>
      </div>
    </div>

    <!-- Right: 2×3 lưới ô lớn (icon gốc Figma) -->
    <div class="grid grid-cols-2 gap-4 sm:gap-5 w-full max-w-[640px] mx-auto lg:mx-0 lg:ml-auto">
      <div class="hero-tile tile-a aspect-square"><img src="assets/figma/ic-camera.svg" alt="" class="w-[42%]"></div>
      <div class="hero-tile tile-b aspect-square"><img src="assets/figma/ic-news.svg" alt="" class="w-[42%]"></div>
      <div class="hero-tile tile-c aspect-square"><img src="assets/figma/ic-radio.svg" alt="" class="w-[42%]"></div>
      <div class="hero-tile tile-d aspect-square">
        <svg viewBox="0 0 48 48" fill="none" stroke="#E08A22" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="w-[42%] h-[42%]"><path d="M8 34a16 16 0 0 1 32 0z"/><path d="M6 34h36"/><circle cx="24" cy="13" r="2.2"/><path d="M24 15.2V18"/></svg>
      </div>
      <div class="hero-tile tile-e aspect-square cursor-pointer" onclick="document.getElementById('lich-su').scrollIntoView()"><img src="assets/figma/ic-arrow.svg" alt="" class="w-[28%] arrow-bounce"></div>
      <div class="hero-tile tile-f aspect-square"><img src="assets/figma/ic-handle.svg" alt="" class="w-[78%]"></div>
    </div>
  </div>
</section>

<!-- Timeline + Heritage + Footer được dựng bên dưới bằng JS -->
<div id="app-sections"></div>

<!-- Nội dung trang (sửa ở đây) -->
<script src="js/data.js"></script>
<!-- Dựng giao diện + hiệu ứng -->
<script src="js/app.js"></script>
<!-- Trình xem VR 360° -->
<script src="js/viewer.js"></script>
</body>
</html>
