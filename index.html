<!doctype html>
<html lang="vi" data-lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bảo tàng Báo chí Việt Nam · VR 360°</title>

<link rel="stylesheet" href="css/tailwind.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,500;1,600;1,700&display=swap&subset=vietnamese" rel="stylesheet" />

<!-- Pannellum 360° viewer (tải hoãn — chỉ cần khi mở tour, không chặn hiển thị trang) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css" media="print" onload="this.media='all'" />
<script defer src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<!-- Giao diện trang (Tailwind tĩnh + style riêng) -->
<link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-cream text-ink">

<!-- ============================= HEADER ============================= -->
<header class="site-header fixed top-0 inset-x-0 z-50">
  <div class="max-w-[1280px] mx-auto px-5 md:px-8 h-[72px] flex items-center justify-between gap-4">
    <!-- Logo -->
    <a href="#home" class="flex items-center gap-3 shrink-0">
      <svg viewBox="0 0 64 64" width="40" height="40" aria-hidden="true">
        <g fill="none" stroke="#C2902F" stroke-width="2" stroke-linecap="round">
          <path d="M32 40c-7-2-13-9-13-17 6 1 11 6 13 13 2-7 7-12 13-13 0 8-6 15-13 17Z" fill="#EBD9AE" fill-opacity=".5"/>
          <path d="M20 30c-5 1-9 5-10 10 6 1 11-2 13-7" fill="#EBD9AE" fill-opacity=".4"/>
          <path d="M44 30c5 1 9 5 10 10-6 1-11-2-13-7" fill="#EBD9AE" fill-opacity=".4"/>
          <path d="M32 41v8"/>
        </g>
      </svg>
      <div class="leading-tight">
        <div class="font-display text-[15px] tracking-wide text-ink" data-vi-text="Bảo tàng Báo chí" data-en-text="Press Museum">Bảo tàng Báo chí</div>
        <div class="text-[9px] tracking-[.28em] uppercase text-gold" data-vi-text="Việt Nam" data-en-text="of Vietnam">Việt Nam</div>
      </div>
    </a>

    <!-- Nav -->
    <nav class="hidden md:flex items-center gap-7 text-[15px]">
      <a href="#home" class="navlink" data-nav data-vi-text="Trang chủ" data-en-text="Home">Trang chủ</a>
      <span class="gold-rule-v h-4"></span>
      <a href="#lich-su" class="navlink" data-nav data-vi-text="Lịch sử" data-en-text="History">Lịch sử</a>
      <span class="gold-rule-v h-4"></span>
      <a href="#ban-do" class="navlink" data-nav data-vi-text="Bản đồ" data-en-text="Map">Bản đồ</a>
      <span class="gold-rule-v h-4"></span>
      <a href="#footer" class="navlink" data-nav data-vi-text="Liên hệ" data-en-text="Contact">Liên hệ</a>
    </nav>

    <!-- Right -->
    <div class="flex items-center gap-3">
      <div class="lang-toggle" role="tablist" aria-label="Language">
        <button type="button" data-set-lang="vi" class="active">VI</button>
        <button type="button" data-set-lang="en">EN</button>
      </div>
      <a href="#ban-do" class="btn-vr hidden sm:inline-flex items-center gap-2 px-5 py-2.5 text-sm">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-14 9V3Z"/></svg>
        <span data-vi-text="Trải nghiệm VR 360°" data-en-text="Experience VR 360°">Trải nghiệm VR 360°</span>
      </a>
    </div>
  </div>
</header>

<!-- ============================= HERO ============================= -->
<section id="home" class="relative pt-[72px] min-h-screen flex items-center overflow-hidden">
  <div class="max-w-[1280px] mx-auto w-full px-5 md:px-8 grid lg:grid-cols-[1.05fr_.95fr] gap-8 lg:gap-12 items-center py-12">

    <!-- Left: 101 + nib + headline -->
    <div class="relative">
      <!-- 101 watermark -->
      <div class="hero-101 absolute -top-6 left-0 text-[150px] sm:text-[200px] lg:text-[230px] pointer-events-none select-none">101</div>

      <!-- Pen nib -->
      <div class="relative flex justify-center lg:justify-start">
        <svg viewBox="0 0 200 360" width="170" class="relative z-10 drop-shadow-[0_18px_30px_rgba(188,131,31,.35)]" aria-hidden="true">
          <defs>
            <linearGradient id="nib" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#F4DDA9"/>
              <stop offset=".45" stop-color="#E3B25E"/>
              <stop offset="1" stop-color="#C5851E"/>
            </linearGradient>
          </defs>
          <path d="M88 16 Q100 6 112 16 L120 92 Q176 122 168 204 L100 338 L32 204 Q24 122 80 92 Z"
                fill="url(#nib)"/>
          <rect x="96.5" y="40" width="7" height="150" rx="3.5" fill="#FCFAF4"/>
          <circle cx="100" cy="206" r="22" fill="#FCFAF4"/>
          <circle cx="100" cy="206" r="22" fill="none" stroke="#C5851E" stroke-width="1.5" stroke-opacity=".4"/>
        </svg>
      </div>

      <!-- Headline -->
      <div class="relative z-10 mt-6 lg:mt-8 lg:pl-2 text-center lg:text-left">
        <h1 class="font-display leading-[.98]">
          <span class="block font-serif italic font-semibold text-[36px] sm:text-[48px] text-goldgrad uppercase tracking-wide" data-vi-text="Bút Sắc" data-en-text="Sharp Pen">Bút Sắc</span>
          <span class="block text-[40px] sm:text-[56px] font-bold tracking-tight text-bronze uppercase" data-vi-text="Lòng Son" data-en-text="Pure Heart">Lòng Son</span>
          <span class="block text-[40px] sm:text-[56px] font-bold tracking-tight text-bronze uppercase" data-vi-text="Tâm Sáng" data-en-text="Bright Soul">Tâm Sáng</span>
        </h1>
        <p class="font-serif italic text-gold text-lg sm:text-xl mt-5 max-w-[42ch] mx-auto lg:mx-0"
           data-vi-text="Tự hào trăm năm Báo chí Cách mạng Việt Nam giữ lửa ngòi bút."
           data-en-text="A proud century of Vietnam's revolutionary press, keeping the pen's flame alive.">
          Tự hào trăm năm Báo chí Cách mạng Việt Nam giữ lửa ngòi bút.
        </p>
      </div>
    </div>

    <!-- Right: gold tiles -->
    <div class="grid grid-cols-2 gap-3 sm:gap-4 max-w-[440px] w-full mx-auto">
      <div class="hero-tile tile-a aspect-square">
        <svg viewBox="0 0 48 48" fill="none" stroke="#fff" stroke-width="2.2" stroke-linejoin="round"><rect x="8" y="18" width="20" height="16" rx="2"/><path d="M28 23l10-5v14l-10-5"/><circle cx="15" cy="13" r="3.5"/><circle cx="22" cy="12" r="3"/></svg>
      </div>
      <div class="hero-tile tile-b aspect-square">
        <svg viewBox="0 0 48 48" fill="none" stroke="#fff" stroke-width="2.2"><rect x="8" y="11" width="32" height="26" rx="3"/><path d="M8 18h32"/><circle cx="13" cy="14.5" r="1.2" fill="#fff"/><path d="M22 25h12"/></svg>
      </div>
      <div class="hero-tile tile-c aspect-square">
        <svg viewBox="0 0 48 48" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"><rect x="7" y="20" width="34" height="18" rx="3"/><path d="M14 20l22-9"/><circle cx="16" cy="29" r="4"/><path d="M31 26h4M31 31h4"/></svg>
      </div>
      <div class="hero-tile tile-d aspect-square">
        <svg viewBox="0 0 48 48" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"><path d="M10 36h28"/><path d="M16 36V25a8 8 0 0116 0v11"/><path d="M24 17v-4"/></svg>
      </div>
      <div class="hero-tile tile-e aspect-square cursor-pointer" onclick="document.getElementById('lich-su').scrollIntoView()">
        <svg class="arrow-bounce" viewBox="0 0 48 48" fill="none" stroke="#C2902F" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M24 12v24M14 27l10 10 10-10"/></svg>
      </div>
      <div class="hero-tile tile-f aspect-square">
        <span class="font-serif italic text-white/70 text-[11px] sm:text-xs px-2 text-center leading-tight">@vietnampressmuseum</span>
      </div>
    </div>
  </div>
</section>

<!-- Timeline + Heritage + Footer được dựng bên dưới bằng JS -->
<div id="app-sections"></div>

<!-- Nội dung trang (sửa ở đây) -->
<script src="js/data.js"></script>
<!-- Dựng giao diện + hiệu ứng -->
<script src="js/app.js"></script>
<!-- Trình xem VR 360° -->
<script src="js/viewer.js"></script>
</body>
</html>
