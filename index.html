<!doctype html>
<html lang="vi" data-lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bảo tàng Báo chí Việt Nam · VR 360°</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,500;1,600;1,700&display=swap&subset=vietnamese" rel="stylesheet" />

<!-- Pannellum 360° viewer -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css" />
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          display: ['"Playfair Display"','"EB Garamond"','Georgia','serif'],
          serif: ['"EB Garamond"','Georgia','serif'],
          sans: ['"Be Vietnam Pro"','system-ui','sans-serif'],
        },
        colors: {
          cream:    '#FCFAF4',
          cream2:   '#F6EFE1',
          ink:      '#2C2113',
          ink2:     '#5A4A30',
          gold:     '#C99A3F',
          goldlt:   '#E6C277',
          goldbr:   '#EBCB82',
          golddp:   '#A9731F',
          bronze:   '#8A5A1C',
          night:    '#1A140B',
        },
      },
    },
  };
</script>

<style>
  :root{
    --cream:#FCFAF4; --ink:#2C2113; --gold:#C99A3F; --goldlt:#E6C277;
    --golddp:#A9731F; --bronze:#8A5A1C; --night:#1A140B;
  }
  *{ scroll-behavior:smooth; }
  html,body{ background:var(--cream); color:var(--ink); }
  body{ font-family:'Be Vietnam Pro',system-ui,sans-serif; overflow-x:hidden; }
  .font-display{ font-family:'Playfair Display','EB Garamond',serif; }
  .font-serif{ font-family:'EB Garamond',Georgia,serif; }

  ::selection{ background:rgba(201,154,63,.25); }

  /* gold gradient text */
  .text-goldgrad{
    background:linear-gradient(135deg,#E8C77E 0%,#D2A24E 38%,#B97E26 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .gold-rule{ height:1px; background:linear-gradient(90deg,transparent,rgba(201,154,63,.55),transparent); }
  .gold-rule-v{ width:1px; background:linear-gradient(180deg,transparent,rgba(201,154,63,.5),transparent); }

  .eyebrow{ text-transform:uppercase; letter-spacing:.34em; font-size:11px; font-weight:600; color:var(--golddp); }

  /* ===== Header ===== */
  .site-header{ transition: background .4s, box-shadow .4s, border-color .4s; }
  .site-header.scrolled{
    background:rgba(252,250,244,.82);
    backdrop-filter:blur(14px) saturate(140%);
    -webkit-backdrop-filter:blur(14px) saturate(140%);
    box-shadow:0 1px 0 rgba(201,154,63,.25), 0 12px 30px -22px rgba(44,33,19,.5);
  }
  .navlink{ position:relative; color:#5A4A30; font-weight:500; transition:color .25s; }
  .navlink:hover{ color:var(--golddp); }
  .navlink::after{
    content:""; position:absolute; left:0; bottom:-6px; height:1.5px; width:0;
    background:linear-gradient(90deg,#E6C277,#A9731F); transition:width .3s;
  }
  .navlink:hover::after,.navlink.active::after{ width:100%; }

  .lang-toggle{ display:inline-flex; border:1px solid rgba(201,154,63,.5); border-radius:9999px; padding:2px; }
  .lang-toggle button{ padding:5px 12px; font-size:11px; font-weight:700; letter-spacing:.1em; color:#9c8862; border-radius:9999px; transition:all .25s; }
  .lang-toggle button.active{ background:linear-gradient(180deg,#E8C77E,#C2902F); color:#2C2113; box-shadow:0 3px 8px -2px rgba(169,115,31,.5); }

  .btn-vr{
    background:linear-gradient(135deg,#EAC97E 0%,#D3A24B 50%,#BC831F 100%);
    color:#2A1F10; font-weight:600; border-radius:9999px;
    box-shadow:0 10px 24px -10px rgba(188,131,31,.7), inset 0 1px 0 rgba(255,255,255,.4);
    transition:transform .25s, box-shadow .25s, filter .25s;
  }
  .btn-vr:hover{ transform:translateY(-2px); box-shadow:0 16px 30px -10px rgba(188,131,31,.8); filter:brightness(1.05); }

  /* ===== Hero ===== */
  .hero-101{
    font-family:'Playfair Display',serif; font-weight:800;
    color:#F1E8D5;
    line-height:.8; letter-spacing:-.04em;
    user-select:none;
    text-shadow:0 2px 0 #fff;
  }
  .hero-tile{
    position:relative; border-radius:10px; overflow:hidden;
    display:grid; place-items:center;
    transition:transform .5s cubic-bezier(.2,.7,.2,1), box-shadow .5s;
    box-shadow:0 14px 30px -18px rgba(138,90,28,.5);
  }
  .hero-tile:hover{ transform:translateY(-3px); box-shadow:0 22px 40px -18px rgba(138,90,28,.65); }
  .hero-tile svg{ width:46%; height:46%; opacity:.9; }
  .tile-a{ background:linear-gradient(150deg,#E7B958,#D49E3C); }
  .tile-b{ background:linear-gradient(150deg,#F6E7C4,#EAD09A); }
  .tile-c{ background:linear-gradient(150deg,#EBC069,#DCA744); }
  .tile-d{ background:linear-gradient(150deg,#F7EACB,#EDD6A4); }
  .tile-e{ background:linear-gradient(150deg,#F8EDD2,#F0DDB0); }
  .tile-f{ background:linear-gradient(150deg,#E9BD60,#D9A03F); }

  .arrow-bounce{ animation: bob 2.4s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(8px); } }

  /* ===== Reveal animation ===== */
  .reveal{ opacity:0; transform:translateY(34px); transition:opacity .8s cubic-bezier(.2,.7,.2,1), transform .8s cubic-bezier(.2,.7,.2,1); }
  .reveal.in{ opacity:1; transform:none; }
  .reveal-l{ opacity:0; transform:translateX(-46px); transition:opacity .8s cubic-bezier(.2,.7,.2,1), transform .8s cubic-bezier(.2,.7,.2,1); }
  .reveal-r{ opacity:0; transform:translateX(46px); transition:opacity .8s cubic-bezier(.2,.7,.2,1), transform .8s cubic-bezier(.2,.7,.2,1); }
  .reveal-l.in,.reveal-r.in{ opacity:1; transform:none; }

  /* ===== Timeline ===== */
  #lich-su{ position:relative; }
  .tl-wrap{ position:relative; }
  .tl-spine{
    position:absolute; top:0; bottom:0; width:2px;
    left:18px; /* mobile */
    background:rgba(201,154,63,.18);
  }
  .tl-fill{
    position:absolute; top:0; left:0; width:100%;
    height:0; background:linear-gradient(180deg,#E8C77E,#BC831F);
    box-shadow:0 0 14px rgba(201,154,63,.55);
    transition:height .12s linear;
  }
  @media(min-width:860px){ .tl-spine{ left:50%; transform:translateX(-1px); } }

  .tl-item{ position:relative; padding-left:54px; }
  @media(min-width:860px){
    .tl-item{ padding-left:0; width:50%; }
    .tl-item.left{ left:0; padding-right:56px; text-align:right; }
    .tl-item.right{ left:50%; padding-left:56px; text-align:left; }
  }

  .tl-dot{
    position:absolute; top:4px; left:11px; width:16px; height:16px; border-radius:50%;
    background:var(--cream); border:2px solid rgba(201,154,63,.45);
    transition:all .5s; z-index:2;
  }
  .tl-dot::after{ content:""; position:absolute; inset:3px; border-radius:50%; background:transparent; transition:background .5s, box-shadow .5s; }
  @media(min-width:860px){
    .tl-item.left .tl-dot{ left:auto; right:-8px; }
    .tl-item.right .tl-dot{ left:-8px; }
  }
  .tl-item.in .tl-dot{ border-color:#C2902F; transform:scale(1.12); }
  .tl-item.in .tl-dot::after{ background:linear-gradient(180deg,#E8C77E,#BC831F); box-shadow:0 0 10px 2px rgba(201,154,63,.7); }

  .tl-card{
    background:rgba(255,253,248,.7);
    border:1px solid rgba(201,154,63,.28);
    border-radius:12px; padding:20px 22px;
    box-shadow:0 18px 40px -28px rgba(138,90,28,.6);
    transition:transform .4s, box-shadow .4s, border-color .4s;
  }
  .tl-card:hover{ transform:translateY(-3px); border-color:rgba(201,154,63,.55); box-shadow:0 26px 50px -26px rgba(138,90,28,.7); }
  .tl-badge{
    display:inline-block; font-family:'Playfair Display',serif; font-weight:700;
    font-size:13px; letter-spacing:.04em; color:#A9731F;
    border:1px solid rgba(201,154,63,.45); border-radius:9999px; padding:3px 12px; margin-bottom:10px;
  }
  .tl-item.era .tl-card{ background:linear-gradient(135deg,rgba(247,235,206,.85),rgba(238,219,176,.7)); border-color:rgba(201,154,63,.5); }
  .tl-item.era .tl-badge{ background:linear-gradient(180deg,#E8C77E,#C2902F); color:#2C2113; border-color:transparent; }

  /* ===== Section 3 cards ===== */
  .heritage-card{
    position:relative; border-radius:14px; overflow:hidden; aspect-ratio:4/3;
    box-shadow:0 22px 46px -26px rgba(138,90,28,.6), 0 0 0 1px rgba(201,154,63,.25);
    transition:transform .55s cubic-bezier(.2,.7,.2,1), box-shadow .55s;
    cursor:pointer;
  }
  .heritage-card:hover{ box-shadow:0 32px 60px -24px rgba(138,90,28,.7), 0 0 0 1px rgba(201,154,63,.6); }
  .heritage-card .img{ position:absolute; inset:0; background-size:cover; background-position:center; transition:transform .8s cubic-bezier(.2,.7,.2,1); }
  .heritage-card:hover .img{ transform:scale(1.06); }
  .heritage-card .tint{ position:absolute; inset:0; background:linear-gradient(160deg,rgba(26,20,11,.05),rgba(26,20,11,.28)); opacity:0; transition:opacity .5s; }
  .heritage-card:hover .tint{ opacity:1; }
  /* image placeholders */
  .img-1{ background:linear-gradient(150deg,#F4E6C4 0%,#E2BE72 60%,#CE9B40 100%); background-image:url('assets/pano-sanh.jpg'); background-size:280% auto; background-position:50% 42%; }
  .img-2{ background:linear-gradient(150deg,#EEDFB8 0%,#D9B777 55%,#B98E45 100%); }
  .img-3{ background:linear-gradient(150deg,#E9C173 0%,#CE8E3C 55%,#9E6322 100%); }
  .img-4{ background:linear-gradient(150deg,#DCCB94 0%,#B59A52 55%,#7E6A30 100%); }
  .img-5{ background:linear-gradient(150deg,#EFC36F 0%,#D29A3E 55%,#A06A20 100%); }
  .img-6{ background:linear-gradient(150deg,#F3E3BC 0%,#E0B95F 55%,#C2922F 100%); }

  /* 360 icon badge centered */
  .badge-360{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%) scale(.86);
    width:92px; height:92px; border-radius:50%;
    display:grid; place-items:center; text-align:center;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(8px) saturate(150%); -webkit-backdrop-filter:blur(8px) saturate(150%);
    border:1px solid rgba(255,255,255,.55);
    color:#fff; box-shadow:0 10px 30px -8px rgba(0,0,0,.4);
    opacity:.55; transition:opacity .45s, transform .45s cubic-bezier(.34,1.4,.5,1), box-shadow .45s, background .4s;
  }
  .heritage-card:hover .badge-360{
    opacity:1; transform:translate(-50%,-50%) scale(1);
    background:rgba(255,255,255,.2);
    box-shadow:0 0 0 6px rgba(201,154,63,.25), 0 0 34px 4px rgba(232,199,126,.65), 0 14px 36px -8px rgba(0,0,0,.45);
  }
  .badge-360::before{
    content:""; position:absolute; inset:-9px; border-radius:50%;
    border:1px dashed rgba(255,255,255,.6); opacity:0; transition:opacity .4s;
  }
  .heritage-card:hover .badge-360::before{ opacity:1; animation:spin 7s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* big pulse CTA */
  .cta-pulse{
    position:relative; background:linear-gradient(135deg,#EAC97E,#D3A24B 50%,#BC831F);
    color:#241a0d; font-weight:700; border-radius:9999px;
    box-shadow:0 16px 36px -14px rgba(188,131,31,.8), inset 0 1px 0 rgba(255,255,255,.45);
    transition:transform .25s, filter .25s;
  }
  .cta-pulse:hover{ transform:translateY(-2px); filter:brightness(1.06); }
  .cta-pulse::before,.cta-pulse::after{
    content:""; position:absolute; inset:0; border-radius:9999px; border:2px solid rgba(201,154,63,.6);
    animation:halo 2.6s ease-out infinite;
  }
  .cta-pulse::after{ animation-delay:1.3s; }
  @keyframes halo{
    0%{ transform:scale(1); opacity:.6; }
    100%{ transform:scale(1.28); opacity:0; }
  }

  /* footer map dots */
  .map-grid{ background-image:
      linear-gradient(rgba(201,154,63,.12) 1px,transparent 1px),
      linear-gradient(90deg,rgba(201,154,63,.12) 1px,transparent 1px);
    background-size:26px 26px; }

  @media (prefers-reduced-motion: reduce){
    .reveal,.reveal-l,.reveal-r{ opacity:1 !important; transform:none !important; }
    .arrow-bounce,.cta-pulse::before,.cta-pulse::after{ animation:none; }
  }
</style>
</head>
<body class="bg-cream text-ink">

<!-- ============================= HEADER ============================= -->
<header class="site-header fixed top-0 inset-x-0 z-50">
  <div class="max-w-[1280px] mx-auto px-5 md:px-8 h-[72px] flex items-center justify-between gap-4">
    <!-- Logo -->
    <a href="#home" class="flex items-center gap-3 shrink-0">
      <svg viewBox="0 0 64 64" width="40" height="40" aria-hidden="true">
        <g fill="none" stroke="#C2902F" stroke-width="2" stroke-linecap="round">
          <path d="M32 40c-7-2-13-9-13-17 6 1 11 6 13 13 2-7 7-12 13-13 0 8-6 15-13 17Z" fill="#EBD9AE" fill-opacity=".5"/>
          <path d="M20 30c-5 1-9 5-10 10 6 1 11-2 13-7" fill="#EBD9AE" fill-opacity=".4"/>
          <path d="M44 30c5 1 9 5 10 10-6 1-11-2-13-7" fill="#EBD9AE" fill-opacity=".4"/>
          <path d="M32 41v8"/>
        </g>
      </svg>
      <div class="leading-tight">
        <div class="font-display text-[15px] tracking-wide text-ink" data-vi-text="Bảo tàng Báo chí" data-en-text="Press Museum">Bảo tàng Báo chí</div>
        <div class="text-[9px] tracking-[.28em] uppercase text-gold" data-vi-text="Việt Nam" data-en-text="of Vietnam">Việt Nam</div>
      </div>
    </a>

    <!-- Nav -->
    <nav class="hidden md:flex items-center gap-7 text-[15px]">
      <a href="#home" class="navlink" data-nav data-vi-text="Trang chủ" data-en-text="Home">Trang chủ</a>
      <span class="gold-rule-v h-4"></span>
      <a href="#lich-su" class="navlink" data-nav data-vi-text="Lịch sử" data-en-text="History">Lịch sử</a>
      <span class="gold-rule-v h-4"></span>
      <a href="#ban-do" class="navlink" data-nav data-vi-text="Bản đồ" data-en-text="Map">Bản đồ</a>
      <span class="gold-rule-v h-4"></span>
      <a href="#footer" class="navlink" data-nav data-vi-text="Liên hệ" data-en-text="Contact">Liên hệ</a>
    </nav>

    <!-- Right -->
    <div class="flex items-center gap-3">
      <div class="lang-toggle" role="tablist" aria-label="Language">
        <button type="button" data-set-lang="vi" class="active">VI</button>
        <button type="button" data-set-lang="en">EN</button>
      </div>
      <a href="#ban-do" class="btn-vr hidden sm:inline-flex items-center gap-2 px-5 py-2.5 text-sm">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-14 9V3Z"/></svg>
        <span data-vi-text="Trải nghiệm VR 360°" data-en-text="Experience VR 360°">Trải nghiệm VR 360°</span>
      </a>
    </div>
  </div>
</header>

<!-- ============================= HERO ============================= -->
<section id="home" class="relative pt-[72px] min-h-screen flex items-center overflow-hidden">
  <div class="max-w-[1280px] mx-auto w-full px-5 md:px-8 grid lg:grid-cols-[1.05fr_.95fr] gap-8 lg:gap-12 items-center py-12">

    <!-- Left: 101 + nib + headline -->
    <div class="relative">
      <!-- 101 watermark -->
      <div class="hero-101 absolute -top-6 left-0 text-[150px] sm:text-[200px] lg:text-[230px] pointer-events-none select-none">101</div>

      <!-- Pen nib -->
      <div class="relative flex justify-center lg:justify-start">
        <svg viewBox="0 0 200 360" width="170" class="relative z-10 drop-shadow-[0_18px_30px_rgba(188,131,31,.35)]" aria-hidden="true">
          <defs>
            <linearGradient id="nib" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#F4DDA9"/>
              <stop offset=".45" stop-color="#E3B25E"/>
              <stop offset="1" stop-color="#C5851E"/>
            </linearGradient>
          </defs>
          <path d="M88 16 Q100 6 112 16 L120 92 Q176 122 168 204 L100 338 L32 204 Q24 122 80 92 Z"
                fill="url(#nib)"/>
          <rect x="96.5" y="40" width="7" height="150" rx="3.5" fill="#FCFAF4"/>
          <circle cx="100" cy="206" r="22" fill="#FCFAF4"/>
          <circle cx="100" cy="206" r="22" fill="none" stroke="#C5851E" stroke-width="1.5" stroke-opacity=".4"/>
        </svg>
      </div>

      <!-- Headline -->
      <div class="relative z-10 mt-6 lg:mt-8 lg:pl-2 text-center lg:text-left">
        <h1 class="font-display leading-[.98]">
          <span class="block font-serif italic font-semibold text-[36px] sm:text-[48px] text-goldgrad uppercase tracking-wide" data-vi-text="Bút Sắc" data-en-text="Sharp Pen">Bút Sắc</span>
          <span class="block text-[40px] sm:text-[56px] font-bold tracking-tight text-bronze uppercase" data-vi-text="Lòng Son" data-en-text="Pure Heart">Lòng Son</span>
          <span class="block text-[40px] sm:text-[56px] font-bold tracking-tight text-bronze uppercase" data-vi-text="Tâm Sáng" data-en-text="Bright Soul">Tâm Sáng</span>
        </h1>
        <p class="font-serif italic text-gold text-lg sm:text-xl mt-5 max-w-[42ch] mx-auto lg:mx-0"
           data-vi-text="Tự hào trăm năm Báo chí Cách mạng Việt Nam giữ lửa ngòi bút."
           data-en-text="A proud century of Vietnam's revolutionary press, keeping the pen's flame alive.">
          Tự hào trăm năm Báo chí Cách mạng Việt Nam giữ lửa ngòi bút.
        </p>
      </div>
    </div>

    <!-- Right: gold tiles -->
    <div class="grid grid-cols-2 gap-3 sm:gap-4 max-w-[440px] w-full mx-auto">
      <div class="hero-tile tile-a aspect-square">
        <svg viewBox="0 0 48 48" fill="none" stroke="#fff" stroke-width="2.2" stroke-linejoin="round"><rect x="8" y="18" width="20" height="16" rx="2"/><path d="M28 23l10-5v14l-10-5"/><circle cx="15" cy="13" r="3.5"/><circle cx="22" cy="12" r="3"/></svg>
      </div>
      <div class="hero-tile tile-b aspect-square">
        <svg viewBox="0 0 48 48" fill="none" stroke="#fff" stroke-width="2.2"><rect x="8" y="11" width="32" height="26" rx="3"/><path d="M8 18h32"/><circle cx="13" cy="14.5" r="1.2" fill="#fff"/><path d="M22 25h12"/></svg>
      </div>
      <div class="hero-tile tile-c aspect-square">
        <svg viewBox="0 0 48 48" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"><rect x="7" y="20" width="34" height="18" rx="3"/><path d="M14 20l22-9"/><circle cx="16" cy="29" r="4"/><path d="M31 26h4M31 31h4"/></svg>
      </div>
      <div class="hero-tile tile-d aspect-square">
        <svg viewBox="0 0 48 48" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"><path d="M10 36h28"/><path d="M16 36V25a8 8 0 0116 0v11"/><path d="M24 17v-4"/></svg>
      </div>
      <div class="hero-tile tile-e aspect-square cursor-pointer" onclick="document.getElementById('lich-su').scrollIntoView()">
        <svg class="arrow-bounce" viewBox="0 0 48 48" fill="none" stroke="#C2902F" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M24 12v24M14 27l10 10 10-10"/></svg>
      </div>
      <div class="hero-tile tile-f aspect-square">
        <span class="font-serif italic text-white/70 text-[11px] sm:text-xs px-2 text-center leading-tight">@vietnampressmuseum</span>
      </div>
    </div>
  </div>
</section>

<!-- Timeline + Heritage + Footer get injected below -->
<div id="app-sections"></div>

<script src="vr360-app.js"></script>
<script src="vr360-viewer.js"></script>
