<!doctype html>
<html lang="vi" data-lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bảo tàng Báo chí Việt Nam · VR 360°</title>

<!-- Favicon: logo hoa sen (trên nền vàng thương hiệu) -->
<link rel="icon" href="favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />

<link rel="stylesheet" href="css/tailwind.css" />

<!-- Pannellum 360° viewer (tải hoãn — chỉ cần khi mở tour, không chặn hiển thị trang) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css" media="print" onload="this.media='all'" />
<script defer src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<!-- Giao diện trang (Tailwind tĩnh + style riêng) -->
<link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-white text-ink">

<!-- ============================= HEADER ============================= -->
<header class="site-header fixed top-0 inset-x-0 z-50">
  <div class="max-w-[1280px] mx-auto px-5 md:px-8 h-[72px] flex items-center justify-between gap-4">
    <!-- Logo -->
    <a href="#home" class="flex items-center gap-3 shrink-0">
      <img src="assets/figma/logo.png" alt="Bảo tàng Báo chí Việt Nam" width="46" height="46" class="w-11 h-11 object-contain shrink-0" />
      <div class="leading-tight">
        <div class="font-logo text-[17px] leading-none tracking-wide" style="color:#814E00" data-vi-text="Bảo tàng Báo chí" data-en-text="Press Museum">Bảo tàng Báo chí</div>
        <div class="text-[9px] tracking-[.28em] uppercase text-orange mt-0.5" data-vi-text="Việt Nam" data-en-text="of Vietnam">Việt Nam</div>
      </div>
    </a>

    <!-- Nav -->
    <nav class="hidden md:flex items-center gap-7 text-[15px]">
      <a href="#home" class="navlink" data-nav data-vi-text="Trang chủ" data-en-text="Home">Trang chủ</a>
      <span class="gold-rule-v h-4"></span>
      <a href="#lich-su" class="navlink" data-nav data-vi-text="Lịch sử" data-en-text="History">Lịch sử</a>
      <span class="gold-rule-v h-4"></span>
      <a href="#ban-do" class="navlink" data-nav data-vi-text="Bản đồ" data-en-text="Map">Bản đồ</a>
      <span class="gold-rule-v h-4"></span>
      <a href="#footer" class="navlink" data-nav data-vi-text="Liên hệ" data-en-text="Contact">Liên hệ</a>
    </nav>

    <!-- Right -->
    <div class="flex items-center gap-3">
      <div class="lang-toggle" role="tablist" aria-label="Language">
        <button type="button" data-set-lang="vi" class="active">VI</button>
        <button type="button" data-set-lang="en">EN</button>
      </div>
      <a href="#ban-do" class="btn-vr hidden sm:inline-flex items-center gap-2 pl-3.5 pr-5 py-2 text-sm">
        <img src="assets/figma/ic-atom-white.svg" alt="" aria-hidden="true" class="w-[18px] h-[18px]">
        <span data-vi-text="Trải nghiệm VR 360°" data-en-text="Experience VR 360°">Trải nghiệm VR 360°</span>
      </a>
    </div>
  </div>
</header>

<!-- ============================= HERO ============================= -->
<section id="home" class="relative pt-[72px] min-h-screen flex items-center overflow-hidden">
  <div class="hero-stage max-w-[1560px] mx-auto w-full px-5 md:px-10 grid lg:grid-cols-[1.22fr_.85fr] gap-6 lg:gap-10 items-center py-6">

    <!-- Left: 101 thật (sau) + ngòi bút thật + headline -->
    <div class="hero-mark">
      <!-- 101 (SVG gốc Figma) -->
      <img src="assets/figma/101.svg" alt="" aria-hidden="true"
           class="hero-101" />

      <!-- ngòi bút thật (trái) + headline (phải) -->
      <div class="hero-lockup">
        <img src="assets/figma/nib.png" alt="" aria-hidden="true"
             class="hero-nib" />

        <div class="hero-copy">
          <h1 class="hero-headline">
            <span class="hero-word hero-word-top text-goldgrad" data-vi-text="Bút Sắc" data-en-text="Sharp Pen">Bút Sắc</span>
            <span class="hero-word hero-word-main" data-vi-text="Lòng Son" data-en-text="Pure Heart">Lòng Son</span>
            <span class="hero-word hero-word-main" data-vi-text="Tâm Sáng" data-en-text="Bright Soul">Tâm Sáng</span>
          </h1>
          <p class="hero-subline"
             data-vi-text="Tự hào trăm năm Báo chí Cách mạng Việt Nam giữ lửa ngòi bút"
             data-en-text="A proud century of Vietnam's revolutionary press, keeping the pen's flame alive.">
            Tự hào trăm năm Báo chí Cách mạng Việt Nam giữ lửa ngòi bút
          </p>
        </div>
      </div>
    </div>

    <!-- Right: 2×3 lưới ô lớn (icon gốc Figma) — ô ngang ~5:4, icon đúng tỉ lệ gốc -->
    <div class="hero-tiles grid grid-cols-2 gap-3 sm:gap-3.5 w-full max-w-[600px] mx-auto lg:mx-0 lg:ml-auto">
      <div class="hero-tile tile-a aspect-[5/4]"><img src="assets/figma/ic-camera.svg" alt="" class="w-[36%]"></div>
      <div class="hero-tile tile-b aspect-[5/4]"><img src="assets/figma/ic-news.svg" alt="" class="w-[46%]"></div>
      <div class="hero-tile tile-c aspect-[5/4]"><img src="assets/figma/ic-radio.svg" alt="" class="w-[45%]"></div>
      <div class="hero-tile tile-d aspect-[5/4]"><img src="assets/figma/ic-dome.svg" alt="" class="w-[62%]"></div>
      <div class="hero-tile tile-e aspect-[5/4] cursor-pointer" onclick="document.getElementById('lich-su').scrollIntoView()"><img src="assets/figma/ic-arrow.svg" alt="" class="w-[9%] arrow-bounce"></div>
      <div class="hero-tile tile-f aspect-[5/4]"><img src="assets/figma/ic-handle.svg" alt="" class="w-[63%]"></div>
    </div>
  </div>
</section>

<!-- Timeline + Heritage + Footer được dựng bên dưới bằng JS -->
<div id="app-sections"></div>

<!-- Nội dung trang (sửa ở đây) -->
<script src="js/data.js"></script>
<!-- Dựng giao diện + hiệu ứng -->
<script src="js/app.js"></script>
<!-- Trình xem VR 360° -->
<script src="js/viewer.js"></script>
</body>
</html>
